<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="frontGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C96A"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8A6820"/>
    </linearGradient>
    <linearGradient id="topGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0D878"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="sideGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A07830"/>
      <stop offset="100%" stop-color="#6A4E18"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12.8" stdDeviation="15.36" flood-color="#C9A84C" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="92.16" fill="url(#bgGrad)"/>

  <!-- Ingot group with shadow -->
  <g filter="url(#shadow)">
    <!-- Top face -->
    <polygon points="140.664832,100.352 371.335168,100.352 407.7568,146.112512 104.2432,146.112512" fill="url(#topGrad)"/>

    <!-- Right side face -->
    <polygon points="371.335168,100.352 407.7568,146.112512 407.7568,263.7824 407.7568,263.7824" fill="url(#sideGrad)" opacity="0.9"/>

    <!-- Front face -->
    <rect x="104.2432" y="146.112512" width="303.5136" height="117.66988799999999" fill="url(#frontGrad)" rx="5.12"/>

    <!-- Shine line on front -->
    <line x1="164.94592" y1="175.529984"
          x2="164.94592" y2="234.364928"
          stroke="rgba(255,255,255,0.18)" stroke-width="6.144" stroke-linecap="round"/>

    <!-- Engraved line top of front -->
    <line x1="128.524288" y1="171.99988736"
          x2="383.475712" y2="171.99988736"
          stroke="rgba(0,0,0,0.25)" stroke-width="4.096"/>
    <line x1="128.524288" y1="237.89502464"
          x2="383.475712" y2="237.89502464"
          stroke="rgba(0,0,0,0.25)" stroke-width="4.096"/>
  </g>

  <!-- DZM text -->
  <text x="256" y="353.38239999999996"
        font-family="Georgia, serif"
        font-size="79.36"
        font-weight="bold"
        letter-spacing="12.8"
        fill="#C9A84C"
        text-anchor="middle">DZM</text>
</svg>